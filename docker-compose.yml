services:

  backend:

    build: ./backend

    ports:

      - "8000:8000"

    volumes:

      - ./backend:/app
      - ./frontend/public/videos:/app/frontend/public/videos
      - ./extract_audio.py:/app/extract_audio.py

    environment:

      - PYTHONUNBUFFERED=1



  frontend:

    build: ./frontend

    ports:

      - "3000:3000"

    depends_on:

      - backend

    environment:

      - NEXT_PUBLIC_API_URL=http://localhost:8000